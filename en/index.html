<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>∅ | UN — Incidence</title>
<link rel="icon" href="data:," />
<style>
  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #030405;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  canvas {
    display: block;
    touch-action: none;
  }

  #identity {
    position: fixed;
    left: 14px;
    top: 12px;
    z-index: 10;
    color: #eef4ff;
    text-shadow: 0 1px 2px #000;
    pointer-events: none;
    user-select: none;
  }

  #mark {
    font-size: 17px;
    letter-spacing: 0.18em;
    line-height: 1.1;
  }

  #name {
    margin-top: 3px;
    font-size: 11px;
    letter-spacing: 0.3em;
    color: #8b94a2;
  }

  #actionDock {
    position: fixed;
    left: 16px;
    bottom: 16px;
    z-index: 12;
    display: flex;
    align-items: flex-end;
    gap: 9px;
  }

  #actionMenu {
    position: relative;
  }

  #menuBtn,
  #walkBtn {
    width: 46px;
    height: 46px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid rgba(112, 132, 158, 0.34);
    border-radius: 50%;
    background: rgba(13, 18, 25, 0.74);
    color: #edf4ff;
    cursor: pointer;
    user-select: none;
    backdrop-filter: blur(7px);
    -webkit-backdrop-filter: blur(7px);
  }

  #menuBtn {
    font: 20px/1 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    list-style: none;
  }

  #walkBtn {
    appearance: none;
    padding: 0;
    position: relative;
    font: 0/0 a;
  }

  #walkBtn::before {
    content: "";
    display: block;
    width: 0;
    height: 0;
    margin-left: 3px;
    border-top: 8px solid transparent;
    border-bottom: 8px solid transparent;
    border-left: 12px solid currentColor;
  }

  #walkBtn.is-active::before {
    width: 14px;
    height: 16px;
    margin-left: 0;
    border: 0;
    background: linear-gradient(90deg, currentColor 0 4px, transparent 4px 10px, currentColor 10px 14px);
  }

  #menuBtn::-webkit-details-marker {
    display: none;
  }

  #actionMenu[open] #menuBtn,
  #walkBtn.is-active {
    background: rgba(54, 68, 86, 0.86);
  }

  #controls {
    position: absolute;
    left: 0;
    bottom: 56px;
    display: flex;
    flex-direction: column;
    gap: 7px;
    min-width: 138px;
    padding: 7px;
    border: 1px solid rgba(112, 132, 158, 0.3);
    border-radius: 18px;
    background: rgba(13, 18, 25, 0.74);
    box-shadow: 0 12px 32px rgba(0, 0, 0, 0.35);
    transform: translateY(8px);
    opacity: 0;
    pointer-events: none;
    transition: opacity 140ms ease, transform 140ms ease;
    backdrop-filter: blur(7px);
    -webkit-backdrop-filter: blur(7px);
  }

  #actionMenu[open] #controls {
    transform: translateY(0);
    opacity: 1;
    pointer-events: auto;
  }

  #controls button,
  #controls a {
    appearance: none;
    display: block;
    border: 1px solid rgba(112, 132, 158, 0.18);
    border-radius: 18px;
    padding: 9px 12px;
    color: #edf4ff;
    background: rgba(54, 68, 86, 0.7);
    font: 13px/1 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    letter-spacing: 0.06em;
    cursor: pointer;
    white-space: nowrap;
    text-align: left;
    text-decoration: none;
  }

  #controls button:hover,
  #controls a:hover {
    background: rgba(78, 96, 120, 0.88);
  }

  #controls button:active {
    transform: translateY(1px);
  }

  body.is-intro #walkBtn {
    display: none;
  }

  @media (max-width: 820px) {
    #identity {
      left: 10px;
      top: 10px;
    }

    #mark {
      font-size: 15px;
    }

    #name {
      font-size: 10px;
    }

    #actionDock {
      left: 12px;
      bottom: 14px;
      gap: 8px;
    }

    #menuBtn,
    #walkBtn {
      width: 44px;
      height: 44px;
    }

    #menuBtn {
      font-size: 19px;
    }

    #controls {
      bottom: 54px;
      min-width: 126px;
      max-width: calc(100vw - 24px);
    }

    #controls button,
    #controls a {
      padding: 9px 11px;
      font-size: 12px;
      letter-spacing: 0.02em;
    }
  }
</style>
</head>
<body class="is-intro">
<div id="identity">
  <div id="mark">∅ | UN</div>
  <div id="name">Incidence</div>
</div>
<div id="actionDock">
  <details id="actionMenu">
    <summary id="menuBtn" aria-label="Open options">⋯</summary>
    <div id="controls">
      <button id="viewBtn" type="button">Viewing Position</button>
      <button id="replayBtn" type="button">Replay Opening</button>
      <a id="language" href="../" hreflang="zh-CN" aria-label="Chinese version">中文</a>
    </div>
  </details>
  <button id="walkBtn" type="button" data-walk="▶" data-stop="Ⅱ" aria-label="Play walkers">▶</button>
</div>
<script>
document.getElementById("controls").addEventListener("click", (event) => {
  if (event.target.closest("button")) {
    requestAnimationFrame(() => {
      document.getElementById("actionMenu").removeAttribute("open");
    });
  }
});
</script>
<script type="importmap">
{
  "imports": {
    "three": "../vendor/three.module.js",
    "three/addons/": "../vendor/addons/",
    "three/examples/jsm/": "../vendor/addons/",
    "three-mesh-bvh": "../vendor/three-mesh-bvh.module.js",
    "three-gpu-pathtracer": "../vendor/three-gpu-pathtracer.module.js"
  }
}
</script>
<script type="module" src="../app.js"></script>
</body>
</html>
