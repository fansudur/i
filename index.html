<style>
  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #030405;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  }

  canvas {
    display: block;
    touch-action: none;
  }

  #identity {
    position: fixed;
    left: 14px;
    top: 12px;
    z-index: 10;
    color: #eef4ff;
    text-shadow: 0 1px 2px #000;
    pointer-events: none;
    user-select: none;
  }

  #mark {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 17px;
    letter-spacing: 0;
    line-height: 1.1;
  }

  .markText {
    letter-spacing: 0.18em;
  }

  .emptySymbol {
    position: relative;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 0.82em;
    height: 0.82em;
    box-sizing: border-box;
    border: 0;
    border-radius: 0;
    flex: 0 0 auto;
    font-family: "Segoe UI Symbol", "Noto Sans Symbols", "DejaVu Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 1.08em;
    line-height: 1;
  }

  .emptySymbol::before {
    content: "∅";
  }

  #name {
    margin-top: 3px;
    font-size: 11px;
    letter-spacing: 0.3em;
    color: #8b94a2;
  }

  #actionDock {
    position: fixed;
    left: 16px;
    bottom: 16px;
    z-index: 12;
    display: flex;
    align-items: flex-end;
    gap: 9px;
  }

  #actionMenu {
    position: relative;
  }

  #menuBtn,
  #aboutBtn,
  #walkBtn {
    width: 46px;
    height: 46px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid rgba(112, 132, 158, 0.34);
    border-radius: 50%;
    background: rgba(13, 18, 25, 0.74);
    color: #edf4ff;
    cursor: pointer;
    user-select: none;
    backdrop-filter: blur(7px);
    -webkit-backdrop-filter: blur(7px);
  }

  #menuBtn {
    font: 20px/1 -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    list-style: none;
  }

  #aboutBtn {
    appearance: none;
    padding: 0;
    position: absolute;
    left: 0;
    bottom: 56px;
    font: 20px/1 -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  }

  #aboutBtn .emptySymbol {
    width: auto;
    height: auto;
    font-size: 21px;
  }

  #walkBtn {
    appearance: none;
    padding: 0;
    position: relative;
    font: 0/0 a;
  }

  #walkBtn::before {
    content: "";
    display: block;
    width: 0;
    height: 0;
    margin-left: 3px;
    border-top: 8px solid transparent;
    border-bottom: 8px solid transparent;
    border-left: 12px solid currentColor;
  }

  #walkBtn.is-active::before {
    width: 14px;
    height: 16px;
    margin-left: 0;
    border: 0;
    background: linear-gradient(90deg, currentColor 0 4px, transparent 4px 10px, currentColor 10px 14px);
  }

  #menuBtn::-webkit-details-marker {
    display: none;
  }

  #actionMenu[open] #menuBtn,
  #aboutBtn.is-active,
  #walkBtn.is-active {
    background: rgba(54, 68, 86, 0.86);
  }

  #controls {
    position: absolute;
    left: 0;
    bottom: 108px;
    display: flex;
    flex-direction: column;
    gap: 7px;
    min-width: 138px;
    padding: 7px;
    border: 1px solid rgba(112, 132, 158, 0.3);
    border-radius: 18px;
    background: rgba(13, 18, 25, 0.74);
    box-shadow: 0 12px 32px rgba(0, 0, 0, 0.35);
    transform: translateY(8px);
    opacity: 0;
    pointer-events: none;
    transition: opacity 140ms ease, transform 140ms ease;
    backdrop-filter: blur(7px);
    -webkit-backdrop-filter: blur(7px);
  }

  #actionMenu[open] #controls {
    transform: translateY(0);
    opacity: 1;
    pointer-events: auto;
  }

  #controls button,
  #controls a {
    appearance: none;
    display: block;
    border: 1px solid rgba(112, 132, 158, 0.18);
    border-radius: 18px;
    padding: 9px 12px;
    color: #edf4ff;
    background: rgba(54, 68, 86, 0.7);
    font: 13px/1 -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    letter-spacing: 0.06em;
    cursor: pointer;
    white-space: nowrap;
    text-align: left;
    text-decoration: none;
  }

  #controls button:hover,
  #controls a:hover {
    background: rgba(78, 96, 120, 0.88);
  }

  #controls button:active {
    transform: translateY(1px);
  }

  body.is-intro #walkBtn {
    display: none;
  }

  #aboutOverlay {
    position: fixed;
    inset: 0;
    z-index: 28;
    display: none;
    align-items: flex-end;
    justify-content: flex-start;
    box-sizing: border-box;
    padding: 24px 24px 128px 16px;
    background: rgba(0, 0, 0, 0.22);
  }

  #aboutOverlay.is-open {
    display: flex;
  }

  #aboutDialog {
    position: relative;
    width: min(620px, calc(100vw - 48px));
    max-height: min(70vh, 680px);
    overflow-y: auto;
    box-sizing: border-box;
    border: 1px solid rgba(143, 160, 184, 0.34);
    border-radius: 22px;
    padding: 34px 34px 28px;
    color: #edf4ff;
    background: rgba(8, 11, 16, 0.88);
    box-shadow: 0 22px 70px rgba(0, 0, 0, 0.48);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    outline: none;
  }

  #aboutClose {
    position: absolute;
    right: 14px;
    top: 12px;
    width: 34px;
    height: 34px;
    border: 1px solid rgba(112, 132, 158, 0.28);
    border-radius: 50%;
    color: #edf4ff;
    background: rgba(54, 68, 86, 0.54);
    font: 22px/1 -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    cursor: pointer;
  }

  #aboutClose:hover {
    background: rgba(78, 96, 120, 0.82);
  }

  .about-copy {
    white-space: pre-line;
    font: 15px/1.74 -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    letter-spacing: 0.02em;
  }

  .about-signature {
    margin-top: 26px;
    color: #8b94a2;
    font-size: 12px;
    letter-spacing: 0.08em;
  }

  .srOnly {
    position: absolute;
    width: 1px;
    height: 1px;
    padding: 0;
    margin: -1px;
    overflow: hidden;
    clip: rect(0, 0, 0, 0);
    white-space: nowrap;
    border: 0;
  }

  @media (max-width: 820px) {
    #identity {
      left: 10px;
      top: 10px;
    }

    #mark {
      font-size: 15px;
    }

    #name {
      font-size: 10px;
    }

    #actionDock {
      left: 12px;
      bottom: 14px;
      gap: 8px;
    }

    #menuBtn,
    #aboutBtn,
    #walkBtn {
      width: 44px;
      height: 44px;
    }

    #menuBtn {
      font-size: 19px;
    }

    #aboutBtn {
      bottom: 52px;
      font-size: 19px;
    }

    #controls {
      bottom: 104px;
      min-width: 126px;
      max-width: calc(100vw - 24px);
    }

    #controls button,
    #controls a {
      padding: 9px 11px;
      font-size: 12px;
      letter-spacing: 0.04em;
    }

    #aboutOverlay {
      box-sizing: border-box;
      padding: 14px 14px 132px;
    }

    #aboutDialog {
      width: calc(100vw - 28px);
      max-height: calc(100vh - 164px);
      max-height: calc(100dvh - 164px);
      border-radius: 20px;
      padding: 30px 22px 24px;
    }

    .about-copy {
      font-size: 14px;
      line-height: 1.7;
    }
  }
</style>
</head>
<body class="is-intro">
<div id="identity">
  <div id="mark" aria-label="∅ | UN"><span class="emptySymbol" aria-hidden="true"></span><span class="markText">| UN</span></div>
  <div id="name">Incidence</div>
</div>
<div id="actionDock">
  <button id="aboutBtn" type="button" aria-label="作品说明"><span class="emptySymbol" aria-hidden="true"></span></button>
  <details id="actionMenu">
    <summary id="menuBtn" aria-label="打开选项">⋯</summary>
    <div id="controls">
      <button id="viewBtn" type="button">回到观影位置</button>
      <button id="replayBtn" type="button">重播片头</button>
      <a id="language" href="./en/" hreflang="en" aria-label="English version">English</a>
    </div>
  </details>
  <button id="walkBtn" type="button" data-walk="▶" data-stop="Ⅱ" aria-label="播放人物行走">▶</button>
</div>
<div id="aboutOverlay" aria-hidden="true">
  <section id="aboutDialog" role="dialog" aria-modal="true" aria-labelledby="aboutTitle" tabindex="-1">
    <button id="aboutClose" type="button" aria-label="关闭">×</button>
    <h2 id="aboutTitle" class="srOnly">作品说明</h2>
    <div class="about-copy">睁开眼睛,即世界存在。
世界取决于谁在什么位置观察它,
一切在观察开始的那一刻被注定。

从你的第一个选择开始,你就有了自己的光的路径。
你的运动,是它在不同空间里的时间切片;
你的一生,是被它精准锁定的不同阶段与层级;
你的世界,是光经过时设定好的结界。

看似理所当然的一个世界、一幅画面,往往多面而多层
彼此看得见,却无法跨越,无法互相理解。

而此刻,你正站在唯一让这一切成立的位置上。</div>
    <div class="about-signature">∅ | UN — Incidence · FANSUDUR</div>
  </section>
</div>
<script>
const actionDock = document.getElementById("actionDock");
const actionMenu = document.getElementById("actionMenu");
const controls = document.getElementById("controls");
const aboutBtn = document.getElementById("aboutBtn");
const aboutOverlay = document.getElementById("aboutOverlay");
const aboutDialog = document.getElementById("aboutDialog");
const aboutClose = document.getElementById("aboutClose");

const stopShellEvent = (event) => {
  event.stopPropagation();
};

actionDock.addEventListener("pointerdown", stopShellEvent);
actionDock.addEventListener("click", stopShellEvent);
aboutOverlay.addEventListener("pointerdown", stopShellEvent);
aboutOverlay.addEventListener("click", stopShellEvent);

const openAbout = () => {
  actionMenu.removeAttribute("open");
  aboutOverlay.classList.add("is-open");
  aboutOverlay.setAttribute("aria-hidden", "false");
  aboutBtn.classList.add("is-active");
  aboutDialog.focus({ preventScroll: true });
};

const closeAbout = () => {
  aboutOverlay.classList.remove("is-open");
  aboutOverlay.setAttribute("aria-hidden", "true");
  aboutBtn.classList.remove("is-active");
  aboutBtn.focus({ preventScroll: true });
};

controls.addEventListener("click", (event) => {
  if (event.target.closest("button")) {
    requestAnimationFrame(() => {
      actionMenu.removeAttribute("open");
    });
  }
});

aboutBtn.addEventListener("click", openAbout);
aboutClose.addEventListener("click", closeAbout);

aboutOverlay.addEventListener("click", (event) => {
  if (event.target === aboutOverlay) {
    closeAbout();
  }
});

document.addEventListener("keydown", (event) => {
  if (event.key === "Escape" && aboutOverlay.classList.contains("is-open")) {
    closeAbout();
  }
});
</script>
